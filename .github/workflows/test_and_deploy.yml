#
# Run tests, bump version, create tag and release, and notify edition
# repositories
#

name: Test and deploy to PYPI

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout datapie/develop
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: develop
          path: datapie
          token: ${{ secrets.IRISPIE_ACTIONS_TOKEN_2025 }}

      - name: Checkout datapie-tests/master
        uses: actions/checkout@v4
        with:
          repository: IRIS-Solutions-Team/datapie-tests
          fetch-depth: 1
          ref: master
          path: datapie-tests
          token: ${{ secrets.IRISPIE_ACTIONS_TOKEN_2025 }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          pip install -e datapie
          pip install pytest toml

      - name: Run tests
        working-directory: datapie-tests
        run: |
          pytest -ra -v @specs


  version-bump:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      new-version: ${{ steps.bump-version.outputs.new-version }}

    steps:
      - name: Checkout datapie/develop
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: develop
          path: datapie
          token: ${{ secrets.IRISPIE_ACTIONS_TOKEN_2025 }}
          repository: IRIS-Solutions-Team/datapie

      - name: Set up identity
        working-directory: datapie
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies for version bumping
        run: |
          pip install toml

      - name: Bump version in pyproject.toml
        id: bump-version
        working-directory: datapie
        run: |
          if ! [[ -e ./.release_type ]]; then
            echo "Cannot release without .release_type"
            exit 1
          fi
          RELEASE_TYPE=$(< ./.release_type)
          python ./.github/workflows/bump_version.py --release-type=$RELEASE_TYPE
          NEW_VERSION=$(python ./.github/workflows/print_version.py)
          echo "new-version=$NEW_VERSION" >> $GITHUB_OUTPUT 

      - name: Commit and push new version to develop
        env:
            version: ${{ steps.bump-version.outputs.new-version }}
        working-directory: datapie
        run: |
          git switch develop
          git add ./pyproject.toml
          git rm .release_type
          git commit -m "Bump version to $version"
          git tag $version
          git push origin develop --tags

      - name: Create release
        id: create-release
        env:
          version: ${{ steps.bump-version.outputs.new-version }}
          # gh picks the token from GITHUB_TOKEN env variable automatically
          GITHUB_TOKEN: ${{ secrets.IRISPIE_ACTIONS_TOKEN_2025 }}
        working-directory: datapie
        run: |
            gh release create "$version" \
              --title "Release $version" \
              --notes ""

  deploy-to-pypi:
    needs: version-bump
    runs-on: ubuntu-latest

    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: master
          path: datapie
          token: ${{ secrets.IRISPIE_ACTIONS_TOKEN_2025 }}

      - name: Set up identity
        working-directory: datapie
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install build dependencies
        run: |
            python -m pip install --upgrade pip build twine toml

      - name: Get version
        working-directory: datapie
        run: |
          VERSION=$(python .github/workflows/print_version.py)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Build dist files
        working-directory: datapie
        run: |
            python -m build

      - name: Upload to PYPI
        env:
          PYPI_TOKEN: ${{ secrets.ALL_PYPI_TOKEN_2025 }}
        working-directory: datapie
        run: |
            python -m twine upload dist/* -r pypi -u __token__ -p $PYPI_TOKEN --verbose

      - name: Upload new dist as artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ env.VERSION }}
          path: datapie/dist/*

